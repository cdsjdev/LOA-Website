<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1440 218" width="1440" height="218">
  <defs>

    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0a0a0a"/>
      <stop offset="40%"  stop-color="#1a1a14"/>
      <stop offset="50%"  stop-color="#111110"/>
      <stop offset="100%" stop-color="#060606"/>
    </linearGradient>

    <linearGradient id="stripe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000" stop-opacity="0"/>
      <stop offset="28%"  stop-color="#6a3800" stop-opacity="0.5"/>
      <stop offset="45%"  stop-color="#d08000" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#f8c800" stop-opacity="1"/>
      <stop offset="55%"  stop-color="#d08000" stop-opacity="1"/>
      <stop offset="72%"  stop-color="#6a3800" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="10%"  stop-color="#e0e0e0"/>
      <stop offset="25%"  stop-color="#a8a8a8"/>
      <stop offset="42%"  stop-color="#f0f0f0"/>
      <stop offset="52%"  stop-color="#ffffff"/>
      <stop offset="66%"  stop-color="#c0c0c0"/>
      <stop offset="82%"  stop-color="#848484"/>
      <stop offset="100%" stop-color="#686868"/>
    </linearGradient>

    <filter id="glow" x="-2%" y="-100%" width="104%" height="300%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="clip">
      <rect x="8" y="8" width="1424" height="202" rx="28" ry="28"/>
    </clipPath>

  </defs>

  <rect x="8" y="8" width="1424" height="202" rx="28" ry="28"
        fill="url(#bg)" stroke="#444433" stroke-width="3"/>
  <rect x="13" y="13" width="1414" height="192" rx="25" ry="25"
        fill="none" stroke="#777755" stroke-width="1" opacity="0.4"/>
  <rect x="8" y="8" width="1424" height="202" rx="28" ry="28"
        fill="url(#stripe)" clip-path="url(#clip)" filter="url(#glow)"/>

  <g font-family="'Baskerville','Didot','Georgia','Times New Roman',serif"
     font-size="170" font-weight="700" font-style="normal"
     text-anchor="middle"
     transform="translate(720,0) scale(0.9,1) translate(-720,0)">

    <text x="720" y="155" fill="#000"    transform="translate(9,9)">Lights On America</text>
    <text x="720" y="155" fill="#111108" transform="translate(6,6)">Lights On America</text>
    <text x="720" y="155" fill="#252516" transform="translate(4,4)">Lights On America</text>
    <text x="720" y="155" fill="#383820" transform="translate(2,2)">Lights On America</text>
    <text x="720" y="155" fill="#444428" transform="translate(1,1)">Lights On America</text>

    <text x="720" y="155" fill="none"
          stroke="#000" stroke-width="8" stroke-linejoin="round">Lights On America</text>

    <text x="720" y="155" fill="url(#chrome)">Lights On America</text>

    <text x="720" y="155" fill="none"
          stroke="#fff" stroke-width="2" stroke-linejoin="round" opacity="0.4">Lights On America</text>

  </g>
</svg>
